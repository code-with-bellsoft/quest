services:
  postgres:
    image: postgres:16-alpine
    container_name: quest-board-postgres
    environment:
        POSTGRES_DB: quest_board
        POSTGRES_USER: quest_user
        POSTGRES_PASSWORD: quest_pass
    networks:
      - quest_net
    ports:
        - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U quest_user -d quest_board" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
        - quest-board-postgres-data:/var/lib/postgresql/data

  backend-spring:
    profiles: [ "spring" ]
    build:
      context: ./spring/
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
    container_name: spring
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quest_net
    ports:
      - "8080:8080"

  backend-quarkus:
    profiles: [ "quarkus" ]
    build:
      context: ./quarkus/
      dockerfile: Dockerfile
    environment:
      QUARKUS_PROFILE: prod
    container_name: quarkus
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quest_net
    ports:
      - "8080:8080"

  backend-jooby:
    profiles: [ "jooby" ]
    build:
      context: ./jooby/
      dockerfile: Dockerfile
    environment:
      application.env: prod
    container_name: jooby
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quest_net
    ports:
      - "8080:8080"


volumes:
    quest-board-postgres-data:

networks:
  quest_net: